<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Animal Pro</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #25d366; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 20px;}
        .admin-card { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin-top: 0; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 10px;}
        button:hover { background: #1eb956; }
        .status { text-align: center; margin-top: 10px; font-size: 0.85rem; font-weight: bold;}
    </style>
</head>
<body>

<div class="admin-card">
    <h2>⚙️ Configuración General</h2>
    <label>Días mínimos para entrega:</label>
    <input type="number" id="minDays" placeholder="Ej: 2">
    <label>Mensaje de aviso emergente:</label>
    <textarea id="announcement" rows="3" placeholder="Ej: ¡Hoy tenemos entrega inmediata!"></textarea>
    <button onclick="guardarAjustes()">ACTUALIZAR PLATAFORMA</button>
    <div id="status" class="status"></div>
</div>

<div class="admin-card">
    <h2>📦 Añadir Nuevo Producto</h2>
    <label>Nombre del Producto:</label>
    <input type="text" id="prodNombre" placeholder="Ej: BOLSAS SEMEN MAXTER">
    <label>Precio (sin puntos ni comas):</label>
    <input type="number" id="prodPrecio" placeholder="Ej: 90000">
    <label>Imagen del Producto:</label>
    <input type="file" id="prodImagen" accept="image/*">
    <button onclick="guardarProducto()">GUARDAR PRODUCTO</button>
    <div id="statusProd" class="status"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzWP-H2VHbSZUbO7AZRQMzOfE-2XWhmcpOPn72-bdbxQI1NA-Ew0pXZVmjscgMW4nK0/exec";

    // 1. Guardar Ajustes (Tu código original)
    async function guardarAjustes() {
        const status = document.getElementById('status');
        const data = {
            tipo: "UPDATE_SETTINGS",
            dias: document.getElementById('minDays').value,
            mensaje: document.getElementById('announcement').value
        };
        status.innerText = "⏳ Guardando cambios...";
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            status.style.color = "#25d366"; status.innerText = "✅ ¡Configuración actualizada!";
        } catch (e) {
            status.style.color = "#ff4d4d"; status.innerText = "❌ Error al conectar.";
        }
    }

    // 2. Comprimir imagen y Guardar Producto
    function guardarProducto() {
        const nombre = document.getElementById('prodNombre').value.toUpperCase();
        const precio = document.getElementById('prodPrecio').value;
        const fileInput = document.getElementById('prodImagen');
        const status = document.getElementById('statusProd');

        if(!nombre || !precio || !fileInput.files[0]) {
            status.style.color = "#ff4d4d"; status.innerText = "⚠️ Completa todos los campos";
            return;
        }

        status.style.color = "#bbb"; status.innerText = "⏳ Optimizando imagen...";

        // Redimensionar imagen a Max 400px para no saturar Google Sheets
        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                const maxSize = 400;
                let width = img.width; let height = img.height;

                if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }

                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Convertir a Base64 comprimido
                const base64Imagen = canvas.toDataURL('image/jpeg', 0.6); 

                // Enviar al servidor
                status.innerText = "⏳ Guardando en catálogo...";
                const data = { tipo: "ADD_PRODUCT", nombre: nombre, precio: parseInt(precio), imagen: base64Imagen };

                try {
                    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
                    status.style.color = "#25d366"; status.innerText = "✅ ¡Producto agregado con éxito!";
                    
                    // Limpiar formulario
                    document.getElementById('prodNombre').value = '';
                    document.getElementById('prodPrecio').value = '';
                    document.getElementById('prodImagen').value = '';
                } catch (err) {
                    status.style.color = "#ff4d4d"; status.innerText = "❌ Error al conectar con el servidor.";
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
