<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Animal Pro</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #25d366; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 20px;}
        .admin-card { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin-top: 0; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #bbb; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 10px;}
        button:hover { background: #1eb956; }
        .status { text-align: center; margin-top: 10px; font-size: 0.85rem; font-weight: bold;}
        .grupo-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .grupo-container select { margin-bottom: 0; }
        .btn-plus { width: 50px; padding: 0; font-size: 1.2rem; margin-bottom: 0; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>⚙️ Configuración General</h2>
    <label>Días mínimos para entrega:</label>
    <input type="number" id="minDays" placeholder="Ej: 2">
    <label>Mensaje de aviso emergente:</label>
    <textarea id="announcement" rows="3" placeholder="Ej: ¡Hoy tenemos entrega inmediata!"></textarea>
    <button onclick="guardarAjustes()">ACTUALIZAR PLATAFORMA</button>
    <div id="status" class="status"></div>
</div>

<div class="admin-card">
    <h2>📦 Añadir Nuevo Producto</h2>
    
    <label>Grupo / Categoría:</label>
    <div class="grupo-container">
        <select id="prodGrupoSelect">
            <option value="">Cargando grupos...</option>
        </select>
        <button class="btn-plus" onclick="toggleNuevoGrupo()" title="Añadir nuevo grupo">➕</button>
    </div>
    <input type="text" id="prodGrupoNuevo" placeholder="Escribe el nombre del nuevo grupo" style="display: none;">

    <label>Nombre del Producto:</label>
    <input type="text" id="prodNombre" placeholder="Ej: BOLSAS SEMEN MAXTER">
    <label>Precio (sin puntos ni comas):</label>
    <input type="number" id="prodPrecio" placeholder="Ej: 90000">
    <label>Imagen del Producto:</label>
    <input type="file" id="prodImagen" accept="image/*">
    <button onclick="guardarProducto()">GUARDAR PRODUCTO</button>
    <div id="statusProd" class="status"></div>
</div>

<script>
    // ** PON TU URL DE GOOGLE APPS SCRIPT AQUÍ **
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzWZ30hBZkVPdGlJ0fdww4j_xvIokOTiQTbYqZxzJkm38h4z0BQ5kONSEU-JXXQazz7/exec";

    // Cargar los grupos existentes al entrar
    window.onload = async function() {
        try {
            const res = await fetch(WEB_APP_URL + "?getData=1");
            const data = await res.json();
            const select = document.getElementById('prodGrupoSelect');
            select.innerHTML = "";
            if(data.grupos && data.grupos.length > 0) {
                data.grupos.forEach(g => {
                    select.innerHTML += `<option value="${g}">${g}</option>`;
                });
            } else {
                select.innerHTML = `<option value="GENERAL">GENERAL</option>`;
            }
        } catch(e) { console.error("Error al cargar grupos", e); }
    };

    function toggleNuevoGrupo() {
        const input = document.getElementById('prodGrupoNuevo');
        const select = document.getElementById('prodGrupoSelect');
        if(input.style.display === 'none') {
            input.style.display = 'block';
            select.style.display = 'none';
            input.focus();
        } else {
            input.style.display = 'none';
            select.style.display = 'block';
        }
    }

    async function guardarAjustes() {
        const status = document.getElementById('status');
        const data = { tipo: "UPDATE_SETTINGS", dias: document.getElementById('minDays').value, mensaje: document.getElementById('announcement').value };
        status.innerText = "⏳ Guardando cambios...";
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            status.style.color = "#25d366"; status.innerText = "✅ ¡Configuración actualizada!";
        } catch (e) {
            status.style.color = "#ff4d4d"; status.innerText = "❌ Error al conectar.";
        }
    }

    function guardarProducto() {
        const nombre = document.getElementById('prodNombre').value.toUpperCase();
        const precio = document.getElementById('prodPrecio').value;
        const fileInput = document.getElementById('prodImagen');
        
        // Obtener el grupo seleccionado o escrito
        const selectGrupo = document.getElementById('prodGrupoSelect');
        const inputGrupo = document.getElementById('prodGrupoNuevo');
        let grupo = inputGrupo.style.display === 'block' ? inputGrupo.value.toUpperCase() : selectGrupo.value.toUpperCase();
        if(!grupo) grupo = "GENERAL";

        const status = document.getElementById('statusProd');

        if(!nombre || !precio || !fileInput.files[0]) {
            status.style.color = "#ff4d4d"; status.innerText = "⚠️ Completa todos los campos";
            return;
        }

        status.style.color = "#bbb"; status.innerText = "⏳ Optimizando imagen...";

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                const maxSize = 400;
                let width = img.width; let height = img.height;

                if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }

                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const base64Imagen = canvas.toDataURL('image/jpeg', 0.6); 

                status.innerText = "⏳ Guardando en catálogo...";
                // Incluimos el grupo en los datos
                const data = { tipo: "ADD_PRODUCT", nombre: nombre, precio: parseInt(precio), imagen: base64Imagen, grupo: grupo };

                try {
                    await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
                    status.style.color = "#25d366"; status.innerText = "✅ ¡Producto agregado!";
                    
                    document.getElementById('prodNombre').value = '';
                    document.getElementById('prodPrecio').value = '';
                    document.getElementById('prodImagen').value = '';
                    // Si se añadió un grupo nuevo, recargar para actualizar la lista
                    if(inputGrupo.style.display === 'block') { setTimeout(()=> location.reload(), 1500); }
                } catch (err) {
                    status.style.color = "#ff4d4d"; status.innerText = "❌ Error al conectar con el servidor.";
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
