<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Animal Pro</title>
    <style>
        :root { 
            --primary: #25d366; 
            --dark: #121212; 
            --card-bg: #ffffff;
            --light: #f4f7f6; 
            --danger: #ff4d4d;
            --accent: #1b5e20;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 110px; background: var(--light); }
        
        #modal-aviso { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(5px); }
        .aviso-content { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .aviso-content h2 { color: var(--accent); margin-top: 0; font-size: 1.4rem; }
        .aviso-content p { color: #444; line-height: 1.5; font-size: 1.1rem; margin: 20px 0; }
        .btn-aviso-ok { background: var(--primary); color: white; border: none; padding: 12px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }

        header { background: var(--accent); color: white; padding: 1.5rem; text-align: center; font-weight: bold; font-size: 1.3rem; }
        
        .search-container { text-align: center; padding: 20px 12px 10px 12px; position: sticky; top: 0; background: var(--light); z-index: 1000; }
        .search-bar { width: 100%; max-width: 600px; padding: 14px 20px 14px 45px; border-radius: 24px; border: 1px solid #dfe1e5; font-size: 1rem; outline: none; transition: box-shadow 0.2s, border-color 0.2s; box-sizing: border-box; background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="gray" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>') no-repeat 18px center; }
        .search-bar:focus { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: transparent; }

        .banner-grupo { background: linear-gradient(135deg, var(--accent) 0%, #2e8b57 100%); color: white; padding: 12px 20px; border-radius: 12px; font-weight: 800; margin: 15px 12px 10px 12px; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; }

        .contenedor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 12px 12px; }
        .producto { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); text-align: center; cursor: pointer; position: relative; transition: transform 0.2s; }
        .producto:active { transform: scale(0.97); }
        .badge { position: absolute; top: 8px; right: 8px; background: var(--danger); color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; display: none; z-index: 10; }
        .producto img { width: 100%; height: 150px; object-fit: contain; background: #fff; padding: 5px; box-sizing: border-box; }
        .info-prod { padding: 10px; flex-grow: 1; }
        .info-prod h3 { font-size: 0.75rem; margin: 5px 0; color: #333; text-transform: uppercase; }
        .info-prod p { color: var(--accent); font-weight: bold; font-size: 1rem; margin: 5px 0 0 0;}

        /* Descuentos Rojos */
        .precio-original { text-decoration: line-through; color: #999; font-size: 0.8rem; margin-right: 5px; font-weight: normal; }
        .etiqueta-descuento { background: #e53935; color: white; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; margin-left: 8px; vertical-align: middle; font-weight: 900; display: inline-block; letter-spacing: 0.5px; box-shadow: 0 2px 4px rgba(229,57,53,0.3); }
        .mp-precio-container { margin-bottom: 10px; }

        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #ddd; display: none; justify-content: space-between; align-items: center; padding: 15px 25px; height: 90px; z-index: 100; box-sizing: border-box; }
        .btn-terminar { background: var(--primary); color: white; border: none; padding: 18px 30px; border-radius: 15px; font-weight: 900; cursor: pointer; font-size: 1.1rem; }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; box-sizing: border-box;}
        input[type="text"]:not(.search-bar), input[type="tel"], input[type="date"], select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #eee; background: #f9f9f9; border-radius: 10px; box-sizing: border-box; }
        .btn-enviar { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; }

        #modal-producto { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2500; backdrop-filter: blur(3px); }
        .modal-prod-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; box-sizing: border-box; }
        .cerrar-modal-prod { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; background: none; border: none; color: #888; cursor: pointer; }
        .modal-prod-body { display: flex; gap: 15px; align-items: center; margin-bottom: 20px;}
        .modal-prod-body img { width: 120px; height: 120px; object-fit: contain; border-radius: 10px; background:#fff; padding:5px; border:1px solid #eee;}
        .modal-prod-info { flex-grow: 1; text-align: left; }
        .modal-prod-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #333; }
        .modal-prod-info p.precio { margin: 0 0 10px 0; color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        .modal-prod-info p.desc { margin: 0; font-size: 0.9rem; color: #666; line-height: 1.4; max-height: 80px; overflow-y: auto;}
        
        .modal-prod-controles { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn-qty { background: #f0f0f0; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; color: #333; transition: 0.2s;}
        .btn-qty:active { background: #ddd; transform: scale(0.95);}
        .modal-prod-controles span { font-size: 1.5rem; font-weight: bold; width: 30px; text-align: center;}
        .btn-add-modal { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: background-color 0.3s;}
    </style>
</head>
<body>

<div id="modal-aviso">
    <div class="aviso-content">
        <h2>📢 Aviso Importante</h2>
        <p id="texto-aviso"></p>
        <button class="btn-aviso-ok" onclick="cerrarAviso()">ENTENDIDO</button>
    </div>
</div>

<header>CATÁLOGO ANIMAL PRO</header>

<div class="search-container">
    <input type="text" id="buscador" class="search-bar" placeholder="Buscar productos..." onkeyup="filtrarProductos()">
</div>

<div id="catalogo-principal">
    <p style="text-align: center; color: gray;">⏳ Cargando catálogo...</p>
</div>

<div id="cart-bar">
    <div style="font-weight: bold;">🛒 <span id="contador">0</span> artículos</div>
    <button class="btn-terminar" onclick="abrirFormulario()">VER PEDIDO</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Tu Pedido</h2>
        <div id="lista-resumen"></div>
        <hr>
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <label id="label-fecha" style="font-size:0.8rem; color:gray; display:block; margin-top:10px;">Fecha de recogida:</label>
        <input type="date" id="fechaRecogida">
        <select id="pago">
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia">Transferencia</option>
        </select>
        <button class="btn-enviar" id="btnEnviar" onclick="enviarPedido()">ENVIAR PEDIDO</button>
        <button style="background:none; border:none; color:grey; width:100%; margin-top:10px; cursor:pointer;" onclick="cerrarFormulario()">Cancelar</button>
    </div>
</div>

<div id="modal-producto">
    <div class="modal-prod-content">
        <button class="cerrar-modal-prod" onclick="cerrarModalProducto()">✖</button>
        <div class="modal-prod-body">
            <img id="mp-img" src="" alt="Producto">
            <div class="modal-prod-info">
                <h3 id="mp-nombre">Nombre</h3>
                <div class="mp-precio-container" id="mp-precio-container"></div>
                <p class="desc" id="mp-desc">Descripción aquí...</p>
            </div>
        </div>
        <div class="modal-prod-controles">
            <button class="btn-qty" onclick="cambiarCantModal(-1)">-</button>
            <span id="mp-cant">1</span>
            <button class="btn-qty" onclick="cambiarCantModal(1)">+</button>
        </div>
        <button class="btn-add-modal" onclick="agregarAlCarritoDesdeModal()">AGREGAR AL CARRITO</button>
    </div>
</div>

<script>
    // URL NUEVA Y LIMPIA
    const WEB_APP_URL ="https://script.google.com/macros/s/AKfycbwpm8CKeqBRptJQfu47QhR27G65py60KKlP3b-OGqp4lwv9MFEpgpLV1yxgLLf5kx0/exec"; 
    
    let carrito = [];
    let diasMinimosGlobal = 2;

    window.onload = async function() {
        try {
            const res = await fetch(WEB_APP_URL + "?getData=1");
            const data = await res.json();
            
            if(data.mensaje && data.mensaje.trim() !== "") {
                document.getElementById('texto-aviso').innerText = data.mensaje;
                document.getElementById('modal-aviso').style.display = 'flex';
            }

            diasMinimosGlobal = parseInt(data.dias) || 0;
            const labelFecha = document.getElementById('label-fecha');
            labelFecha.innerText = diasMinimosGlobal === 0 ? 
                "¡Disponible para hoy mismo!:" : 
                `Fecha para recoger (mínimo ${diasMinimosGlobal} día(s)):`;

            const fechaInput = document.getElementById('fechaRecogida');
            const hoy = new Date();
            hoy.setDate(hoy.getDate() + diasMinimosGlobal);
            const anio = hoy.getFullYear();
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const dia = String(hoy.getDate()).padStart(2, '0');
            const minDate = `${anio}-${mes}-${dia}`;
            
            fechaInput.setAttribute('min', minDate);
            fechaInput.value = minDate;

            const catalogo = document.getElementById('catalogo-principal');
            catalogo.innerHTML = ""; 

            if(data.productos && data.productos.length > 0) {
                const productosPorGrupo = {};
                data.productos.forEach(prod => {
                    const grupo = prod.grupo || "GENERAL";
                    if(!productosPorGrupo[grupo]) productosPorGrupo[grupo] = [];
                    productosPorGrupo[grupo].push(prod);
                });

                for(const [grupo, prods] of Object.entries(productosPorGrupo)) {
                    let htmlGrupo = `<div class="seccion-grupo">`;
                    htmlGrupo += `<div class="banner-grupo">📂 ${grupo}</div>`;
                    htmlGrupo += `<div class="contenedor-grid">`;
                    
                    prods.forEach(prod => {
                        let precioOrig = parseInt(prod.precioOriginal);
                        let precioFinal = parseInt(prod.precio);
                        let tieneDescuento = !isNaN(precioOrig) && !isNaN(precioFinal) && precioOrig > precioFinal;
                        let htmlPrecio = "";
                        let porcentajeGuardar = ""; 
                        
                        if (tieneDescuento) {
                            let porcentaje = Math.round(((precioOrig - precioFinal) / precioOrig) * 100);
                            porcentajeGuardar = `-${porcentaje}%`;
                            htmlPrecio = `<p><span class="precio-original">$${precioOrig.toLocaleString()}</span> $${precioFinal.toLocaleString()} <span class="etiqueta-descuento">${porcentajeGuardar}</span></p>`;
                        } else {
                            htmlPrecio = `<p>$${precioFinal.toLocaleString()}</p>`;
                        }

                        htmlGrupo += `
                        <div class="producto" onclick="abrirModalProducto(this)" 
                             data-nombre="${prod.nombre}" 
                             data-precio="${prod.precio}" 
                             data-precio-original="${prod.precioOriginal}"
                             data-descuento="${porcentajeGuardar}"
                             data-img="${prod.imagen}" 
                             data-desc="${prod.descripcion}">
                            <span class="badge">0</span>
                            <img src="${prod.imagen}" alt="${prod.nombre}">
                            <div class="info-prod">
                                <h3>${prod.nombre}</h3>
                                ${htmlPrecio}
                            </div>
                        </div>`;
                    });

                    htmlGrupo += `</div></div>`;
                    catalogo.innerHTML += htmlGrupo;
                }
            } else {
                catalogo.innerHTML = "<p style='text-align: center; color: gray;'>No hay productos disponibles por el momento.</p>";
            }

        } catch (e) { 
            console.error("Error cargando base de datos.", e);
            document.getElementById('catalogo-principal').innerHTML = "<p style='text-align: center; color: red;'>Error cargando el catálogo. Intenta recargar la página.</p>";
        }
    };

    function filtrarProductos() {
        const query = document.getElementById('buscador').value.toLowerCase();
        const secciones = document.querySelectorAll('.seccion-grupo');

        secciones.forEach(seccion => {
            const productos = seccion.querySelectorAll('.producto');
            let coincidenciasEnGrupo = 0;

            productos.forEach(prod => {
                const nombre = prod.getAttribute('data-nombre').toLowerCase();
                const descripcion = prod.getAttribute('data-desc').toLowerCase(); 
                if (nombre.includes(query) || descripcion.includes(query)) {
                    prod.style.display = ''; 
                    coincidenciasEnGrupo++;
                } else { prod.style.display = 'none'; }
            });

            if (coincidenciasEnGrupo === 0) { seccion.style.display = 'none'; } 
            else { seccion.style.display = 'block'; }
        });
    }

    function cerrarAviso() { document.getElementById('modal-aviso').style.display = 'none'; }

    let prodModalActual = { nombre: "", precio: 0, cant: 1 };

    function cantidadPreviaEnCarrito(nombre) { return carrito.filter(item => item.nombre === nombre).length; }

    function abrirModalProducto(elemento) {
        prodModalActual.nombre = elemento.getAttribute('data-nombre');
        prodModalActual.precio = parseInt(elemento.getAttribute('data-precio'));
        
        let precioOriginal = elemento.getAttribute('data-precio-original');
        let descuento = elemento.getAttribute('data-descuento');
        
        let prevCant = cantidadPreviaEnCarrito(prodModalActual.nombre);
        prodModalActual.cant = prevCant > 0 ? prevCant : 1; 

        document.getElementById('mp-img').src = elemento.getAttribute('data-img');
        document.getElementById('mp-nombre').innerText = prodModalActual.nombre;
        document.getElementById('mp-desc').innerText = elemento.getAttribute('data-desc');
        
        let contenedorPrecio = document.getElementById('mp-precio-container');
        if (descuento && descuento !== "null" && descuento !== "") {
            contenedorPrecio.innerHTML = `<p class="precio" style="margin:0; color:var(--accent); font-weight:bold; font-size:1.2rem;"><span class="precio-original">$${parseInt(precioOriginal).toLocaleString()}</span> $${prodModalActual.precio.toLocaleString()} <span class="etiqueta-descuento" style="font-size: 0.9rem;">${descuento}</span></p>`;
        } else {
            contenedorPrecio.innerHTML = `<p class="precio" style="margin:0; color:var(--accent); font-weight:bold; font-size:1.2rem;">$${prodModalActual.precio.toLocaleString()}</p>`;
        }
        
        actualizarBotonModal();
        document.getElementById('modal-producto').style.display = 'flex';
    }

    function cerrarModalProducto() { document.getElementById('modal-producto').style.display = 'none'; }

    function cambiarCantModal(cambio) {
        if (prodModalActual.cant + cambio >= 0) { 
            prodModalActual.cant += cambio;
            actualizarBotonModal();
        }
    }

    function actualizarBotonModal() {
        document.getElementById('mp-cant').innerText = prodModalActual.cant;
        const btn = document.querySelector('.btn-add-modal');
        if (prodModalActual.cant === 0) {
            btn.innerText = "ELIMINAR DEL CARRITO"; btn.style.backgroundColor = "var(--danger)"; 
        } else {
            let prevCant = cantidadPreviaEnCarrito(prodModalActual.nombre);
            btn.innerText = prevCant > 0 ? "ACTUALIZAR CANTIDAD" : "AGREGAR AL CARRITO";
            btn.style.backgroundColor = "var(--primary)"; 
        }
    }

    function agregarAlCarritoDesdeModal() {
        carrito = carrito.filter(item => item.nombre !== prodModalActual.nombre);
        for (let i = 0; i < prodModalActual.cant; i++) {
            carrito.push({ nombre: prodModalActual.nombre, precio: prodModalActual.precio });
        }
        actualizarUI();
        cerrarModalProducto(); 
    }

    function actualizarUI() {
        const bar = document.getElementById('cart-bar');
        document.getElementById('contador').innerText = carrito.length;
        bar.style.display = carrito.length > 0 ? 'flex' : 'none';

        const conteo = {};
        carrito.forEach(prod => { conteo[prod.nombre] = (conteo[prod.nombre] || 0) + 1; });

        document.querySelectorAll('.producto').forEach(div => {
            const nombreProd = div.getAttribute('data-nombre');
            const badge = div.querySelector('.badge');
            const cantidad = conteo[nombreProd] || 0;
            badge.innerText = cantidad;
            badge.style.display = cantidad > 0 ? 'block' : 'none';
        });
    }

    function obtenerCarritoAgrupado() {
        let agrupado = {};
        carrito.forEach(item => {
            if (!agrupado[item.nombre]) { agrupado[item.nombre] = { precioUnitario: item.precio, cantidad: 0, subtotal: 0 }; }
            agrupado[item.nombre].cantidad += 1;
            agrupado[item.nombre].subtotal += item.precio;
        });
        return agrupado;
    }

    function abrirFormulario() {
        const lista = document.getElementById('lista-resumen');
        lista.innerHTML = "";
        let total = 0;
        const carritoAgrupado = obtenerCarritoAgrupado();
        
        for (const [nombre, datos] of Object.entries(carritoAgrupado)) {
            total += datos.subtotal;
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.9rem; border-bottom:1px solid #f0f0f0; padding-bottom:5px;">
                <span><b>${datos.cantidad}x</b> ${nombre}</span>
                <span>$${datos.subtotal.toLocaleString()} <button type="button" onclick="eliminarUnidad('${nombre}')" style="color:red; border:none; background:none; font-weight:bold; cursor:pointer; margin-left:10px;" title="Quitar 1">✕</button></span>
            </div>`;
        }
        lista.innerHTML += `<div style="text-align:right; font-weight:bold; margin-top:15px; font-size:1.1rem; color:var(--accent);">Total: $${total.toLocaleString()}</div>`;
        document.getElementById('modal').style.display = 'flex';
    }

    function eliminarUnidad(nombre) {
        const index = carrito.findIndex(item => item.nombre === nombre);
        if (index > -1) { carrito.splice(index, 1); }
        carrito.length === 0 ? cerrarFormulario() : abrirFormulario();
        actualizarUI();
    }

    function cerrarFormulario() { document.getElementById('modal').style.display = 'none'; }

    // BOTÓN DE ENVIAR (DIRECTO PARA QUE NO BLOQUEE WHATSAPP)
    function enviarPedido() {
        const n = document.getElementById('nombre').value;
        const t = document.getElementById('telefono').value;
        const f = document.getElementById('fechaRecogida').value;
        const p = document.getElementById('pago').value;

        if (!n || !t || !f) return alert("Por favor, completa todos los campos.");

        const btn = document.getElementById('btnEnviar');
        btn.innerText = "⏳ ABRIENDO WHATSAPP...";
        btn.disabled = true;

        let total = 0;
        let resumenTexto = "";
        let itemsSheets = [];
        const carritoAgrupado = obtenerCarritoAgrupado();

        for (const [nombre, datos] of Object.entries(carritoAgrupado)) {
            total += datos.subtotal;
            resumenTexto += `- ${datos.cantidad}x ${nombre} ($${datos.subtotal.toLocaleString()})\n`;
            itemsSheets.push(`${datos.cantidad}x ${nombre}`);
        }

        const pedidoData = { tipo: "PEDIDO", nombre: n, telefono: t, fecha: f, pago: p, items: itemsSheets.join(" / ") };

        const mensajeWA = `*NUEVO PEDIDO* 🐷\n\n*Cliente:* ${n}\n*WhatsApp:* ${t}\n*Fecha Recogida:* ${f}\n*Pago:* ${p}\n\n*PRODUCTOS:* \n${resumenTexto}\n*TOTAL: $${total.toLocaleString()}*`;
        const linkWA = `https://wa.me/573012324030?text=${encodeURIComponent(mensajeWA)}`;

        // Se envía la petición a Sheets por debajo...
        fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(pedidoData) }).catch(e => console.log("Error al guardar en Sheets", e));
        
        // ...y salta instantáneamente a WhatsApp para que el celular no lo tome como Pop-up
        window.location.href = linkWA;
    }
</script>
</body>
</html>
